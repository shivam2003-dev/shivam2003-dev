<svg xmlns="http://www.w3.org/2000/svg" width="720" height="760" viewBox="0 0 720 760" role="img" aria-labelledby="title desc">
  <title id="title">Field notes and contact</title><desc id="desc">The Secure Pipeline newsletter and cvam.sight technical writing, plus email and LinkedIn contact options.</desc>
  <defs><pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse"><path d="M28 0H0V28" fill="none" class="grid-line"/></pattern><clipPath id="frame"><rect width="720" height="760" rx="30"/></clipPath><style>
    text{font-family:Arial,Helvetica,sans-serif}.mono{font-family:"SFMono-Regular",Consolas,"Liberation Mono",monospace}.bg{fill:#080A0C}.panel{fill:#101316}.ink{fill:#F3F0E8}.muted{fill:#89939D}.faint{stroke:#30363C}.grid-line{stroke:#1A2025}.signal{fill:#B8F34A}.signal-stroke{stroke:#B8F34A}.safety{fill:#FF6B35}.pulse{animation:pulse 2.6s ease-out infinite;transform-origin:660px 38px}@keyframes pulse{0%{transform:scale(.6);opacity:.75}78%,100%{transform:scale(2.7);opacity:0}}
    @media(prefers-color-scheme:light){.bg{fill:#F3F0E8}.panel{fill:#E8E3D8}.ink{fill:#111315}.muted{fill:#5F6870}.faint{stroke:#C8C0B1}.grid-line{stroke:#DDD7CB}.signal{fill:#456600}.signal-stroke{stroke:#456600}.safety{fill:#C7461D}}
    @media(prefers-reduced-motion:reduce){.pulse{animation:none!important}}
  </style></defs>
