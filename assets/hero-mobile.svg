<svg xmlns="http://www.w3.org/2000/svg" width="720" height="760" viewBox="0 0 720 760" role="img" aria-labelledby="title desc">
  <title id="title">Shivam Kumar — Platform Engineering and Applied AI</title>
  <desc id="desc">A mobile-first animated control-plane diagram carries a signal through automation, runtime, observability, decisions, and feedback.</desc>

  <defs>
    <filter id="mobileSignalGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <pattern id="mobileGrid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" fill="none" class="grid-line" stroke-width="1" />
    </pattern>
    <clipPath id="mobileFrameClip">
      <rect width="720" height="760" rx="30" />
    </clipPath>
    <path id="mobileRoute" d="M104 494H534Q582 494 582 542V614Q582 658 538 658H104Q60 658 60 614V538Q60 494 104 494Z" />
    <style>
      text { font-family: Arial, Helvetica, sans-serif; }
      .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; }
      .bg { fill: #080A0C; }
      .panel { fill: #101316; }
      .panel-2 { fill: #15191D; }
      .ink { fill: #F3F0E8; }
      .muted { fill: #89939D; }
      .signal { fill: #B8F34A; }
      .signal-stroke { stroke: #B8F34A; }
      .safety { fill: #FF6B35; }
      .faint-stroke { stroke: #30363C; }
      .grid-line { stroke: #1A2025; }
      .route-flow { animation: mobileRouteFlow 2.5s linear infinite; }
      .heartbeat { animation: mobileHeartbeat 2.2s ease-out infinite; transform-origin: 650px 44px; }
      @keyframes mobileRouteFlow { to { stroke-dashoffset: -32; } }
      @keyframes mobileHeartbeat { 0% { transform: scale(.7); opacity: .7; } 75%, 100% { transform: scale(2.5); opacity: 0; } }
      @media (prefers-color-scheme: light) {
        .bg { fill: #F3F0E8; }
        .panel { fill: #E8E3D8; }
        .panel-2 { fill: #DED8CA; }
        .ink { fill: #111315; }
        .muted { fill: #5F6870; }
        .signal { fill: #456600; }
        .signal-stroke { stroke: #456600; }
        .safety { fill: #C7461D; }
        .faint-stroke { stroke: #C8C0B1; }
        .grid-line { stroke: #DDD7CB; }
      }
      @media (prefers-reduced-motion: reduce) {
        .motion { display: none; }
        .route-flow, .heartbeat { animation: none; }
      }
    </style>
  </defs>

  <rect width="720" height="760" rx="30" class="bg" />
  <g clip-path="url(#mobileFrameClip)">
    <circle cx="624" cy="112" r="170" fill="#B8F34A" opacity=".055" />
    <rect x="38" y="452" width="644" height="258" rx="24" fill="url(#mobileGrid)" />
  </g>

  <g transform="translate(40 38)">
    <text x="0" y="10" class="muted mono" font-size="13" font-weight="700" letter-spacing="1.8">FIELD MANUAL 01</text>
    <text x="382" y="10" class="ink mono" font-size="13" font-weight="700" letter-spacing="1.3">SHIVAM KUMAR</text>
    <circle cx="610" cy="5" r="5" class="signal" />
    <circle cx="610" cy="5" r="5" fill="none" class="signal-stroke heartbeat" />
    <line x1="0" y1="32" x2="640" y2="32" class="faint-stroke" />
  </g>

  <g transform="translate(40 116)">
    <text x="0" y="0" class="signal mono" font-size="15" font-weight="700" letter-spacing="2">DEVOPS ENGINEER II × AI INFRASTRUCTURE</text>
    <text x="0" y="68" class="ink" font-size="50" font-weight="700" letter-spacing="-1.8">I make complex</text>
    <text x="0" y="122" class="ink" font-size="50" font-weight="700" letter-spacing="-1.8">systems feel</text>
    <text x="0" y="186" class="signal" font-size="62" font-weight="700" letter-spacing="-2">calm.</text>
    <text x="0" y="232" class="muted" font-size="20">Reliable cloud platforms under pressure.</text>
    <text x="0" y="262" class="muted" font-size="20">Useful AI decisions from complex data.</text>
  </g>

  <g transform="translate(40 404)">
    <text x="0" y="0" class="muted mono" font-size="13" font-weight="700" letter-spacing="1.5">LIVE CONTROL-PLANE TRACE</text>
    <text x="640" y="0" text-anchor="end" class="signal mono" font-size="13" font-weight="700">HEALTHY</text>
  </g>

  <use href="#mobileRoute" fill="none" class="faint-stroke" stroke-width="2" />
  <use href="#mobileRoute" fill="none" class="signal-stroke route-flow" stroke-width="2" stroke-dasharray="6 12" opacity=".42" />

  <g class="motion">
    <circle cx="104" cy="494" r="12" fill="none" class="signal-stroke" opacity="0">
      <animate attributeName="r" values="12;38" dur="9s" begin="0s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;.65;0;0" keyTimes="0;.05;.15;1" dur="9s" begin="0s" repeatCount="indefinite" />
    </circle>
    <circle cx="320" cy="494" r="12" fill="none" class="signal-stroke" opacity="0">
      <animate attributeName="r" values="12;38" dur="9s" begin="1.5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;.65;0;0" keyTimes="0;.05;.15;1" dur="9s" begin="1.5s" repeatCount="indefinite" />
    </circle>
    <circle cx="538" cy="494" r="12" fill="none" class="signal-stroke" opacity="0">
      <animate attributeName="r" values="12;38" dur="9s" begin="3s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;.65;0;0" keyTimes="0;.05;.15;1" dur="9s" begin="3s" repeatCount="indefinite" />
    </circle>
    <circle cx="538" cy="658" r="12" fill="none" class="signal-stroke" opacity="0">
      <animate attributeName="r" values="12;38" dur="9s" begin="4.5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;.65;0;0" keyTimes="0;.05;.15;1" dur="9s" begin="4.5s" repeatCount="indefinite" />
    </circle>
    <circle cx="320" cy="658" r="12" fill="none" class="signal-stroke" opacity="0">
      <animate attributeName="r" values="12;38" dur="9s" begin="6s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;.65;0;0" keyTimes="0;.05;.15;1" dur="9s" begin="6s" repeatCount="indefinite" />
    </circle>
    <circle cx="104" cy="658" r="12" fill="none" class="signal-stroke" opacity="0">
      <animate attributeName="r" values="12;38" dur="9s" begin="7.5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;.65;0;0" keyTimes="0;.05;.15;1" dur="9s" begin="7.5s" repeatCount="indefinite" />
    </circle>
    <circle r="8" class="safety" filter="url(#mobileSignalGlow)" opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;.01;.98;1" dur="9s" repeatCount="indefinite" />
      <animateMotion dur="9s" repeatCount="indefinite" rotate="auto">
        <mpath href="#mobileRoute" />
      </animateMotion>
    </circle>
  </g>

  <g>
    <g transform="translate(104 494)">
      <circle r="28" class="panel-2" stroke="#4A535C" stroke-width="2" />
      <text y="5" text-anchor="middle" class="ink mono" font-size="14" font-weight="700">IN</text>
      <text y="48" text-anchor="middle" class="muted mono" font-size="13">SIGNAL</text>
    </g>
    <g transform="translate(320 494)">
      <circle r="28" class="panel-2" stroke="#4A535C" stroke-width="2" />
      <text y="5" text-anchor="middle" class="ink mono" font-size="14" font-weight="700">01</text>
      <text y="48" text-anchor="middle" class="muted mono" font-size="13">AUTOMATE</text>
    </g>
    <g transform="translate(538 494)">
      <circle r="28" class="panel-2" stroke="#4A535C" stroke-width="2" />
      <text y="5" text-anchor="middle" class="ink mono" font-size="14" font-weight="700">02</text>
      <text y="48" text-anchor="middle" class="muted mono" font-size="13">RUN</text>
    </g>
    <g transform="translate(538 658)">
      <circle r="28" class="panel-2" stroke="#4A535C" stroke-width="2" />
      <text y="5" text-anchor="middle" class="ink mono" font-size="14" font-weight="700">03</text>
      <text y="48" text-anchor="middle" class="muted mono" font-size="13">OBSERVE</text>
    </g>
    <g transform="translate(320 658)">
      <circle r="28" class="panel-2" stroke="#4A535C" stroke-width="2" />
      <text y="5" text-anchor="middle" class="ink mono" font-size="14" font-weight="700">04</text>
      <text y="48" text-anchor="middle" class="muted mono" font-size="13">DECIDE</text>
    </g>
    <g transform="translate(104 658)">
      <circle r="28" class="panel-2" stroke="#4A535C" stroke-width="2" />
      <text y="5" text-anchor="middle" class="ink mono" font-size="15" font-weight="700">↺</text>
      <text y="48" text-anchor="middle" class="muted mono" font-size="13">FEEDBACK</text>
    </g>
  </g>

  <text x="360" y="590" text-anchor="middle" class="ink mono" font-size="15">commit → runtime → telemetry → decision</text>
  <text x="360" y="742" text-anchor="middle" class="muted mono" font-size="12">KIMBAL · M.TECH AI &amp; ML, BITS PILANI</text>
  <rect x="1" y="1" width="718" height="758" rx="29" fill="none" class="faint-stroke" />
</svg>
