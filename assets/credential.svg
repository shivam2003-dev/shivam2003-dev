<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc">
  <title id="title">Verified Google Cloud Associate Cloud Engineer credential</title>
  <desc id="desc">Google Cloud Associate Cloud Engineer certification issued July 2026 and expiring July 2029, part of a twenty-two credential archive.</desc>
  <defs>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse"><path d="M24 0H0V24" fill="none" class="grid-line"/></pattern><clipPath id="frame"><rect width="1200" height="320" rx="28"/></clipPath><filter id="glow" x="-200%" y="-200%" width="500%" height="500%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>
      text{font-family:Arial,Helvetica,sans-serif}.mono{font-family:"SFMono-Regular",Consolas,"Liberation Mono",monospace}.bg{fill:#080A0C}.panel{fill:#101316}.panel2{fill:#15191D}.ink{fill:#F3F0E8}.muted{fill:#89939D}.faint{stroke:#30363C}.grid-line{stroke:#1A2025}.signal{fill:#B8F34A}.signal-stroke{stroke:#B8F34A}.safety{fill:#FF6B35}.safety-stroke{stroke:#FF6B35}.orbit{animation:orbit 14s linear infinite;transform-origin:160px 182px}.pulse{animation:pulse 2.6s ease-out infinite;transform-origin:1128px 39px}@keyframes orbit{to{transform:rotate(360deg)}}@keyframes pulse{0%{transform:scale(.6);opacity:.75}78%,100%{transform:scale(2.7);opacity:0}}
      @media(prefers-color-scheme:light){.bg{fill:#F3F0E8}.panel{fill:#E8E3D8}.panel2{fill:#DED8CA}.ink{fill:#111315}.muted{fill:#5F6870}.faint{stroke:#C8C0B1}.grid-line{stroke:#DDD7CB}.signal{fill:#456600}.signal-stroke{stroke:#456600}.safety{fill:#C7461D}.safety-stroke{stroke:#C7461D}}
      @media(prefers-reduced-motion:reduce){.motion{display:none!important}.orbit,.pulse{animation:none!important}}
    </style>
  </defs>
  <rect width="1200" height="320" rx="28" class="bg"/><g clip-path="url(#frame)"><rect width="1200" height="320" fill="url(#grid)" opacity=".42"/><circle cx="1080" cy="30" r="150" fill="#B8F34A" opacity=".045"/></g>
  <text x="54" y="43" class="muted mono" font-size="12" font-weight="700" letter-spacing="2.2">FIELD MANUAL 06 / VERIFIED CREDENTIAL</text><circle cx="1128" cy="39" r="4" class="signal"/><circle cx="1128" cy="39" r="4" fill="none" class="signal-stroke pulse"/><text x="1114" y="43" text-anchor="end" class="signal mono" font-size="11" font-weight="700">CREDLY VERIFIED</text><line x1="54" y1="65" x2="1146" y2="65" class="faint"/>
  <g transform="translate(54 88)"><rect width="220" height="188" rx="20" class="panel faint"/><circle cx="106" cy="94" r="61" class="panel2 faint" stroke-width="2"/><circle cx="106" cy="94" r="45" fill="none" class="signal-stroke" stroke-width="2" stroke-dasharray="8 9"/><g class="orbit"><circle cx="160" cy="182" r="6" class="signal" filter="url(#glow)" transform="translate(-54 -88)"/></g><path d="M88 94l12 12 25-30" fill="none" class="signal-stroke" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/><text x="106" y="164" text-anchor="middle" class="muted mono" font-size="10" font-weight="700" letter-spacing="1.5">GOOGLE CLOUD / ACE</text></g>
  <g transform="translate(310 100)"><text x="0" y="0" class="signal mono" font-size="11" font-weight="700" letter-spacing="1.6">ISSUED BY GOOGLE CLOUD</text><text x="0" y="52" class="ink" font-size="36" font-weight="700" letter-spacing="-1">Associate Cloud Engineer</text><text x="0" y="84" class="ink" font-size="20" font-weight="700">Certification</text><text x="0" y="122" class="muted" font-size="15">Verified skills in deploying applications, monitoring operations,</text><text x="0" y="146" class="muted" font-size="15">and managing enterprise solutions on Google Cloud.</text><text x="0" y="184" class="signal mono" font-size="12" font-weight="700" letter-spacing="1.2">VERIFY ON CREDLY ↗</text></g>
  <g transform="translate(930 100)"><rect width="216" height="78" rx="16" class="panel faint"/><text x="18" y="34" class="ink" font-size="28" font-weight="700">22</text><text x="62" y="31" class="signal mono" font-size="10" font-weight="700">PROFESSIONAL</text><text x="62" y="49" class="muted mono" font-size="10">CREDENTIALS</text><g transform="translate(0 92)"><rect width="216" height="78" rx="16" class="panel faint"/><text x="18" y="32" class="muted mono" font-size="10" font-weight="700">VALIDITY</text><text x="18" y="57" class="ink mono" font-size="13" font-weight="700">JUL 2026 — JUL 2029</text></g></g>
  <rect x="1" y="1" width="1198" height="318" rx="27" fill="none" class="faint"/>
</svg>
