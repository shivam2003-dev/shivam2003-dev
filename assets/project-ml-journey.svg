<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="280" viewBox="0 0 1200 280" role="img" aria-labelledby="title desc">
  <title id="title">ML Learning Journey — project-first machine learning</title>
  <desc id="desc">Twenty-six guided projects connect mathematics, model behavior, and implementation.</desc>
  <defs>
    <filter id="signalGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <pattern id="microGrid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M20 0H0V20" fill="none" class="grid-line" />
    </pattern>
    <clipPath id="frameClip"><rect width="1200" height="280" rx="24" /></clipPath>
    <symbol id="projectCell" viewBox="0 0 34 20"><rect width="34" height="20" rx="4" /></symbol>
    <path id="learningRoute" d="M765 88H975V116H765V144H975V172H765V200H807" />
    <style>
      text { font-family: Arial, Helvetica, sans-serif; }
      .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; }
      .bg { fill: #080A0C; } .panel { fill: #101316; } .panel-2 { fill: #15191D; }
      .ink { fill: #F3F0E8; } .muted { fill: #89939D; }
      .faint-stroke { stroke: #30363C; } .node-stroke { stroke: #4A535C; } .grid-line { stroke: #1A2025; }
      .signal { fill: #B8F34A; } .signal-stroke { stroke: #B8F34A; }
      .cell-done { fill: #B8F34A; fill-opacity: .1; stroke: #4A535C; }
      .cell-empty { fill: #15191D; stroke: #30363C; opacity: .4; }
      .route-flow { animation: routeFlow 2.8s linear infinite; } .static-fallback { display: none; }
      @keyframes routeFlow { to { stroke-dashoffset: -30; } }
      @media (prefers-color-scheme: light) {
        .bg { fill: #F3F0E8; } .panel { fill: #E8E3D8; } .panel-2 { fill: #DED8CA; }
        .ink { fill: #111315; } .muted { fill: #5F6870; } .faint-stroke { stroke: #C8C0B1; }
        .node-stroke { stroke: #9E978A; } .grid-line { stroke: #DDD7CB; }
        .signal { fill: #456600; } .signal-stroke { stroke: #456600; }
        .cell-done { fill: #456600; stroke: #9E978A; } .cell-empty { fill: #DED8CA; stroke: #C8C0B1; }
      }
      @media (prefers-reduced-motion: reduce) {
        .motion { display: none !important; } .route-flow { animation: none !important; }
        .static-fallback { display: inline !important; }
      }
    </style>
  </defs>

  <rect width="1200" height="280" rx="24" class="bg" />
  <g clip-path="url(#frameClip)">
    <rect x="706" y="20" width="468" height="240" rx="22" fill="url(#microGrid)" />
    <circle cx="1090" cy="46" r="120" class="signal" opacity=".035" />
  </g>

  <g transform="translate(54 42)">
    <text class="signal mono" font-size="12" font-weight="700" letter-spacing="2.1">03 / PROJECT-FIRST MACHINE LEARNING</text>
    <text y="52" class="ink" font-size="36" font-weight="700" letter-spacing="-1.2">ML Learning Journey</text>
    <text y="90" class="muted" font-size="18">Twenty-six guided builds connect mathematics,</text>
    <text y="116" class="muted" font-size="18">model behavior, and implementation.</text>
    <g transform="translate(0 158)">
      <rect width="98" height="28" rx="14" class="panel faint-stroke" />
      <text x="49" y="18" text-anchor="middle" class="ink mono" font-size="11" font-weight="700">26 PROJECTS</text>
      <rect x="108" width="58" height="28" rx="14" class="panel faint-stroke" />
      <text x="137" y="18" text-anchor="middle" class="ink mono" font-size="11" font-weight="700">MATH</text>
      <rect x="176" width="70" height="28" rx="14" class="panel faint-stroke" />
      <text x="211" y="18" text-anchor="middle" class="ink mono" font-size="11" font-weight="700">MODELS</text>
      <rect x="256" width="58" height="28" rx="14" class="panel faint-stroke" />
      <text x="285" y="18" text-anchor="middle" class="ink mono" font-size="11" font-weight="700">CODE</text>
    </g>
  </g>

  <g>
    <rect x="720" y="34" width="426" height="212" rx="18" class="panel faint-stroke" />
    <text x="744" y="61" class="muted mono" font-size="10" font-weight="700" letter-spacing="1.6">26 GUIDED BUILDS / LEARNING TRACE</text>
    <circle cx="1118" cy="57" r="4" class="signal" />

    <g stroke-width="1">
      <use href="#projectCell" x="748" y="78" width="34" height="20" class="cell-done" /><use href="#projectCell" x="790" y="78" width="34" height="20" class="cell-done" /><use href="#projectCell" x="832" y="78" width="34" height="20" class="cell-done" /><use href="#projectCell" x="874" y="78" width="34" height="20" class="cell-done" /><use href="#projectCell" x="916" y="78" width="34" height="20" class="cell-done" /><use href="#projectCell" x="958" y="78" width="34" height="20" class="cell-done" />
      <use href="#projectCell" x="748" y="106" width="34" height="20" class="cell-done" /><use href="#projectCell" x="790" y="106" width="34" height="20" class="cell-done" /><use href="#projectCell" x="832" y="106" width="34" height="20" class="cell-done" /><use href="#projectCell" x="874" y="106" width="34" height="20" class="cell-done" /><use href="#projectCell" x="916" y="106" width="34" height="20" class="cell-done" /><use href="#projectCell" x="958" y="106" width="34" height="20" class="cell-done" />
      <use href="#projectCell" x="748" y="134" width="34" height="20" class="cell-done" /><use href="#projectCell" x="790" y="134" width="34" height="20" class="cell-done" /><use href="#projectCell" x="832" y="134" width="34" height="20" class="cell-done" /><use href="#projectCell" x="874" y="134" width="34" height="20" class="cell-done" /><use href="#projectCell" x="916" y="134" width="34" height="20" class="cell-done" /><use href="#projectCell" x="958" y="134" width="34" height="20" class="cell-done" />
      <use href="#projectCell" x="748" y="162" width="34" height="20" class="cell-done" /><use href="#projectCell" x="790" y="162" width="34" height="20" class="cell-done" /><use href="#projectCell" x="832" y="162" width="34" height="20" class="cell-done" /><use href="#projectCell" x="874" y="162" width="34" height="20" class="cell-done" /><use href="#projectCell" x="916" y="162" width="34" height="20" class="cell-done" /><use href="#projectCell" x="958" y="162" width="34" height="20" class="cell-done" />
      <use href="#projectCell" x="748" y="190" width="34" height="20" class="cell-done" /><use href="#projectCell" x="790" y="190" width="34" height="20" class="cell-done" /><use href="#projectCell" x="832" y="190" width="34" height="20" class="cell-empty" /><use href="#projectCell" x="874" y="190" width="34" height="20" class="cell-empty" /><use href="#projectCell" x="916" y="190" width="34" height="20" class="cell-empty" /><use href="#projectCell" x="958" y="190" width="34" height="20" class="cell-empty" />
    </g>

    <use href="#learningRoute" fill="none" class="signal-stroke route-flow" stroke-width="1" stroke-dasharray="3 12" opacity=".2" />
    <line x1="1032" y1="88" x2="1032" y2="200" class="faint-stroke" stroke-width="2" />
    <g>
      <circle cx="1032" cy="88" r="7" class="panel-2 signal-stroke" />
      <circle cx="1032" cy="144" r="7" class="panel-2 signal-stroke" />
      <circle cx="1032" cy="200" r="7" class="panel-2 signal-stroke" />
      <text x="1050" y="92" class="ink mono" font-size="10" font-weight="700">MATH</text>
      <text x="1050" y="148" class="ink mono" font-size="10" font-weight="700">MODEL</text>
      <text x="1050" y="204" class="ink mono" font-size="10" font-weight="700">BUILD</text>
    </g>

    <g class="motion">
      <circle r="5" class="signal" filter="url(#signalGlow)" opacity="0">
        <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;.03;.97;1" dur="9s" repeatCount="indefinite" />
        <animateMotion dur="9s" repeatCount="indefinite"><mpath href="#learningRoute" /></animateMotion>
      </circle>
      <circle cx="1032" cy="88" r="8" fill="none" class="signal-stroke" opacity="0">
        <animate attributeName="r" values="8;23" dur="9s" repeatCount="indefinite" />
        <animate attributeName="opacity" values=".7;0;0" keyTimes="0;.18;1" dur="9s" repeatCount="indefinite" />
      </circle>
      <circle cx="1032" cy="144" r="8" fill="none" class="signal-stroke" opacity="0">
        <animate attributeName="r" values="8;23" dur="9s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0;0;.7;0;0" keyTimes="0;.34;.4;.56;1" dur="9s" repeatCount="indefinite" />
      </circle>
      <circle cx="1032" cy="200" r="8" fill="none" class="signal-stroke" opacity="0">
        <animate attributeName="r" values="8;23" dur="9s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0;0;.7;0;0" keyTimes="0;.72;.78;.94;1" dur="9s" repeatCount="indefinite" />
      </circle>
    </g>
    <g class="static-fallback">
      <rect x="787" y="187" width="40" height="26" rx="6" fill="none" class="signal-stroke" opacity=".65" />
      <circle cx="1032" cy="200" r="12" fill="none" class="signal-stroke" opacity=".55" />
    </g>
  </g>

  <text x="1146" y="265" text-anchor="end" class="signal mono" font-size="11" font-weight="700" letter-spacing="1.1">START BUILDING ↗</text>
  <rect x="1" y="1" width="1198" height="278" rx="23" fill="none" class="faint-stroke" />
</svg>
