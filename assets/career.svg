    <g transform="translate(0 98)"><rect width="346" height="86" rx="16" class="panel faint"/><text x="18" y="27" class="muted mono" font-size="10" font-weight="700">2020 — 2024 · 8.17/10</text><text x="18" y="53" class="ink" font-size="16" font-weight="700">B.E. · Computer Science</text><text x="18" y="73" class="muted" font-size="12">Panjab University</text></g>
