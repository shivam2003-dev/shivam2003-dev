    <g transform="translate(46 102)"><text y="17" class="muted mono" font-size="11" font-weight="700">JUN 2024 — JUN 2025</text><text y="46" class="ink" font-size="20" font-weight="700">DevOps Engineer · Kimbal</text><text y="70" class="muted" font-size="13">Kubernetes platforms · automation · reliability · cloud delivery</text></g>
    <g transform="translate(46 204)"><text y="17" class="muted mono" font-size="11" font-weight="700">JAN 2024 — JUN 2024</text><text y="46" class="ink" font-size="20" font-weight="700">DevOps Intern · Kimbal</text><text y="70" class="muted" font-size="13">Monitoring · databases · operational automation · production support</text></g>
    <g transform="translate(46 304)"><text y="17" class="muted mono" font-size="11" font-weight="700">JAN 2022 — MAR 2023</text><text y="46" class="ink" font-size="20" font-weight="700">Gemini Ambassador Program · Gemini Solutions</text><text y="70" class="muted" font-size="13">Community · technology advocacy · early industry exposure</text></g>
