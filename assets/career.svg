  <g transform="translate(331 84)"><rect width="259" height="150" rx="18" class="panel faint"/><text x="18" y="28" class="signal mono" font-size="11" font-weight="700" letter-spacing="1.3">02 / RELIABILITY</text><text x="18" y="66" class="ink" font-size="20" font-weight="700">Make reality observable</text><text x="18" y="98" class="muted" font-size="13">Zabbix · SigNoz · PagerDuty · eBPF</text><text x="18" y="121" class="muted" font-size="13">SLI/SLO · incidents · Vault</text></g>
  <g transform="translate(608 84)"><rect width="259" height="150" rx="18" class="panel faint"/><text x="18" y="28" class="signal mono" font-size="11" font-weight="700" letter-spacing="1.3">03 / DATA + AI</text><text x="18" y="66" class="ink" font-size="20" font-weight="700">Operate intelligent systems</text><text x="18" y="98" class="muted" font-size="13">PostgreSQL · Redis · Cassandra · RAG</text><text x="18" y="121" class="muted" font-size="13">LLMOps · GRPO · GPU scheduling</text></g>
  <g transform="translate(885 84)"><rect width="261" height="150" rx="18" class="panel faint"/><text x="18" y="28" class="safety mono" font-size="11" font-weight="700" letter-spacing="1.3">04 / DELIVERY SECURITY</text><text x="18" y="66" class="ink" font-size="20" font-weight="700">Secure the delivery path</text><text x="18" y="98" class="muted" font-size="13">GitHub Actions · CodePipeline · Kyverno</text><text x="18" y="121" class="muted" font-size="13">policy as code · SPIFFE · OpenFGA</text></g>

