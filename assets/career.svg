    <circle cx="18" cy="26" r="7" class="signal"/><circle cx="18" cy="128" r="7" class="panel2 faint"/><circle cx="18" cy="230" r="7" class="panel2 faint"/><circle cx="18" cy="330" r="7" class="panel2 faint"/>
