<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Operating range, experience, education, and community</title>
  <desc id="desc">Shivam Kumar's platform, reliability, data and AI, and delivery-security capabilities; four roles from Gemini Ambassador through DevOps Engineer II at Kimbal; M.Tech at BITS Pilani, engineering degree at Panjab University, HackMIT mentorship, and NSS service.</desc>
  <defs>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse"><path d="M24 0H0V24" fill="none" class="grid-line" /></pattern>
    <clipPath id="frame"><rect width="1200" height="720" rx="28" /></clipPath>
    <filter id="glow" x="-200%" y="-200%" width="500%" height="500%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <path id="capabilityRoute" d="M74 222H1126" />
    <style>
      text{font-family:Arial,Helvetica,sans-serif}.mono{font-family:"SFMono-Regular",Consolas,"Liberation Mono",monospace}
      .bg{fill:#080A0C}.panel{fill:#101316}.panel2{fill:#15191D}.ink{fill:#F3F0E8}.muted{fill:#89939D}.faint{stroke:#30363C}.grid-line{stroke:#1A2025}.signal{fill:#B8F34A}.signal-stroke{stroke:#B8F34A}.safety{fill:#FF6B35}.safety-stroke{stroke:#FF6B35}
      .route{animation:route 9s linear infinite}.pulse{animation:pulse 2.6s ease-out infinite;transform-origin:1128px 39px}.static-fallback{display:none}
      @keyframes route{to{stroke-dashoffset:-76}}@keyframes pulse{0%{transform:scale(.6);opacity:.75}78%,100%{transform:scale(2.7);opacity:0}}
      @media(prefers-color-scheme:light){.bg{fill:#F3F0E8}.panel{fill:#E8E3D8}.panel2{fill:#DED8CA}.ink{fill:#111315}.muted{fill:#5F6870}.faint{stroke:#C8C0B1}.grid-line{stroke:#DDD7CB}.signal{fill:#456600}.signal-stroke{stroke:#456600}.safety{fill:#C7461D}.safety-stroke{stroke:#C7461D}}
      @media(prefers-reduced-motion:reduce){.motion{display:none!important}.route,.pulse{animation:none!important}.static-fallback{display:inline!important}}
    </style>
  </defs>
  <rect width="1200" height="720" rx="28" class="bg"/>
