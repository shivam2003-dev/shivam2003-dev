    <style>
      text{font-family:Arial,Helvetica,sans-serif}.mono{font-family:"SFMono-Regular",Consolas,"Liberation Mono",monospace}.bg{fill:#080A0C}.panel{fill:#101316}.panel2{fill:#15191D}.ink{fill:#F3F0E8}.muted{fill:#89939D}.faint{stroke:#30363C}.grid-line{stroke:#1A2025}.signal{fill:#B8F34A}.signal-stroke{stroke:#B8F34A}.safety{fill:#FF6B35}.pulse{animation:pulse 2.6s ease-out infinite;transform-origin:660px 38px}@keyframes pulse{0%{transform:scale(.6);opacity:.75}78%,100%{transform:scale(2.7);opacity:0}}
      @media(prefers-color-scheme:light){.bg{fill:#F3F0E8}.panel{fill:#E8E3D8}.panel2{fill:#DED8CA}.ink{fill:#111315}.muted{fill:#5F6870}.faint{stroke:#C8C0B1}.grid-line{stroke:#DDD7CB}.signal{fill:#456600}.signal-stroke{stroke:#456600}.safety{fill:#C7461D}}
      @media(prefers-reduced-motion:reduce){.motion{display:none!important}.pulse{animation:none!important}}
    </style>
