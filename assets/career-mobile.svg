<svg xmlns="http://www.w3.org/2000/svg" width="720" height="1460" viewBox="0 0 720 1460" role="img" aria-labelledby="title desc">
  <title id="title">Operating range, experience, education, and community</title>
  <desc id="desc">Mobile career ledger for Shivam Kumar covering platform, reliability, data and AI, delivery security, four professional roles, education, HackMIT mentorship, and NSS service.</desc>
  <defs>
