<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="210" viewBox="0 0 1200 210" role="img" aria-labelledby="title desc">
  <title id="title">The systems improvement loop</title>
  <desc id="desc">An animated path connecting design, automate, ship, observe, learn, and improve</desc>

  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050816" />
      <stop offset="1" stop-color="#0D1330" />
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22D3EE" />
      <stop offset=".5" stop-color="#60A5FA" />
      <stop offset="1" stop-color="#A78BFA" />
    </linearGradient>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="6" result="b" />
      <feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <style>
      text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .dash { animation: dash 4s linear infinite; }
      .breathe { animation: breathe 2.8s ease-in-out infinite; }
      @keyframes dash { to { stroke-dashoffset: -48; } }
      @keyframes breathe { 50% { opacity: .42; } }
      @media (prefers-reduced-motion: reduce) { .dash, .breathe { animation: none; } }
    </style>
  </defs>

  <rect width="1200" height="210" rx="24" fill="url(#panel)" />
  <rect x="1" y="1" width="1198" height="208" rx="23" fill="none" stroke="#334155" />
  <text x="52" y="47" fill="#64748B" font-size="11" font-weight="700" letter-spacing="2.4">THE CONTINUOUS SYSTEMS LOOP</text>

  <path id="route" d="M112 124H1088" fill="none" stroke="#1E293B" stroke-width="2" />
  <path d="M112 124H1088" fill="none" stroke="url(#line)" stroke-opacity=".6" stroke-width="2" stroke-dasharray="8 10" class="dash" />

  <g fill="#0B1227" stroke-width="2">
    <circle cx="112" cy="124" r="31" stroke="#22D3EE" />
    <circle cx="307" cy="124" r="31" stroke="#38BDF8" />
    <circle cx="502" cy="124" r="31" stroke="#60A5FA" />
    <circle cx="698" cy="124" r="31" stroke="#818CF8" />
    <circle cx="893" cy="124" r="31" stroke="#A78BFA" />
    <circle cx="1088" cy="124" r="31" stroke="#C084FC" />
  </g>

  <g fill="#E2E8F0" font-size="11" font-weight="800" text-anchor="middle" letter-spacing="1">
    <text x="112" y="128">DESIGN</text>
    <text x="307" y="128">AUTOMATE</text>
    <text x="502" y="128">SHIP</text>
    <text x="698" y="128">OBSERVE</text>
    <text x="893" y="128">LEARN</text>
    <text x="1088" y="128">IMPROVE</text>
  </g>

  <g fill="#64748B" font-size="10" text-anchor="middle">
    <text x="112" y="177">make failure visible</text>
    <text x="307" y="177">remove the toil</text>
    <text x="502" y="177">small, safe changes</text>
    <text x="698" y="177">measure reality</text>
    <text x="893" y="177">close the loop</text>
    <text x="1088" y="177">repeat calmly</text>
  </g>

  <circle r="7" fill="#F8FAFC" filter="url(#glow)" class="breathe">
    <animateMotion dur="8s" repeatCount="indefinite" path="M112 124H1088" />
  </circle>
</svg>
