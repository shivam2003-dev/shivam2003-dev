<svg xmlns="http://www.w3.org/2000/svg" width="720" height="400" viewBox="0 0 720 400" role="img" aria-labelledby="title desc">
  <title id="title">LokSetu — civic intelligence</title>
  <desc id="desc">Citizen, official, and public signals converge into ranked constituency priorities and action workflows.</desc>
  <defs>
    <filter id="signalGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <pattern id="microGrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" class="grid-line" />
    </pattern>
    <clipPath id="frameClip"><rect width="720" height="400" rx="24" /></clipPath>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; }
      .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; }
      .bg { fill: #080A0C; } .panel { fill: #101316; } .panel-2 { fill: #15191D; }
      .ink { fill: #F3F0E8; } .muted { fill: #89939D; }
      .faint-stroke { stroke: #30363C; } .node-stroke { stroke: #4A535C; } .grid-line { stroke: #1A2025; }
      .signal { fill: #B8F34A; } .signal-stroke { stroke: #B8F34A; } .safety { fill: #FF6B35; }
      .route-flow { animation: routeFlow 2.5s linear infinite; } .static-fallback { display: none; }
      @keyframes routeFlow { to { stroke-dashoffset: -28; } }
      @media (prefers-color-scheme: light) {
        .bg { fill: #F3F0E8; } .panel { fill: #E8E3D8; } .panel-2 { fill: #DED8CA; }
        .ink { fill: #111315; } .muted { fill: #5F6870; } .faint-stroke { stroke: #C8C0B1; }
        .node-stroke { stroke: #9E978A; } .grid-line { stroke: #DDD7CB; }
        .signal { fill: #456600; } .signal-stroke { stroke: #456600; } .safety { fill: #C7461D; }
      }
      @media (prefers-reduced-motion: reduce) {
        .motion { display: none !important; } .route-flow { animation: none !important; }
        .static-fallback { display: inline !important; }
      }
    </style>
  </defs>

  <rect width="720" height="400" rx="24" class="bg" />
  <g clip-path="url(#frameClip)"><rect x="28" y="174" width="664" height="178" rx="20" fill="url(#microGrid)" /></g>
  <text x="40" y="43" class="signal mono" font-size="16" font-weight="700" letter-spacing="1.8">01 / CIVIC INTELLIGENCE</text>
  <text x="40" y="94" class="ink" font-size="42" font-weight="700" letter-spacing="-1.3">LokSetu</text>
  <text x="40" y="132" class="muted" font-size="22">Citizen and public signals become ranked</text>
  <text x="40" y="160" class="muted" font-size="22">priorities and action workflows.</text>

  <rect x="40" y="184" width="640" height="154" rx="18" class="panel faint-stroke" />
  <text x="62" y="209" class="muted mono" font-size="13" font-weight="700" letter-spacing="1.3">SIGNALS → RANKED NEEDS → ACTION</text>
  <circle cx="654" cy="205" r="5" class="signal" />

  <g fill="none" stroke-linecap="round">
    <path d="M70 239H206Q234 239 256 258L278 277" class="faint-stroke" stroke-width="2" />
    <path d="M70 277H278" class="faint-stroke" stroke-width="2" />
    <path d="M70 315H206Q234 315 256 296L278 277" class="faint-stroke" stroke-width="2" />
    <path d="M70 239H206Q234 239 256 258L278 277" class="signal-stroke route-flow" stroke-dasharray="5 11" opacity=".28" />
    <path d="M70 277H278" class="signal-stroke route-flow" stroke-dasharray="5 11" opacity=".28" />
    <path d="M70 315H206Q234 315 256 296L278 277" class="signal-stroke route-flow" stroke-dasharray="5 11" opacity=".28" />
  </g>
  <g>
    <circle cx="70" cy="239" r="7" class="panel-2 node-stroke" />
    <circle cx="70" cy="277" r="7" class="panel-2 node-stroke" />
    <circle cx="70" cy="315" r="7" class="panel-2 node-stroke" />
    <text x="88" y="243" class="muted mono" font-size="11">CITIZENS</text>
    <text x="88" y="281" class="muted mono" font-size="11">DATA</text>
    <text x="88" y="319" class="muted mono" font-size="11">PUBLIC</text>
  </g>
  <rect x="278" y="251" width="82" height="52" rx="12" class="panel-2 node-stroke" />
  <text x="319" y="274" text-anchor="middle" class="signal mono" font-size="10" font-weight="700">RANK</text>
  <text x="319" y="291" text-anchor="middle" class="ink mono" font-size="10">ENGINE</text>
  <g fill="none" class="faint-stroke" stroke-width="2" stroke-linecap="round">
    <path d="M360 277H388Q402 277 402 250V238" />
    <path d="M360 277H402" />
    <path d="M360 277H388Q402 277 402 304V316" />
  </g>
  <g>
    <rect x="402" y="226" width="232" height="22" rx="5" class="panel-2 node-stroke" />
    <rect x="402" y="266" width="174" height="22" rx="5" class="panel-2 node-stroke" />
    <rect x="402" y="306" width="116" height="22" rx="5" class="panel-2 node-stroke" />
    <rect x="402" y="226" width="232" height="22" rx="5" class="signal" opacity=".12" />
    <rect x="402" y="266" width="174" height="22" rx="5" class="signal" opacity=".08" />
    <rect x="402" y="306" width="116" height="22" rx="5" class="signal" opacity=".06" />
    <text x="414" y="241" class="ink mono" font-size="10" font-weight="700">01</text>
    <text x="414" y="281" class="ink mono" font-size="10" font-weight="700">02</text>
    <text x="414" y="321" class="ink mono" font-size="10" font-weight="700">03</text>
  </g>

  <g class="motion">
    <circle r="5" class="safety" filter="url(#signalGlow)" opacity="0">
      <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;.03;.25;.34;1" dur="9s" repeatCount="indefinite" />
      <animateMotion path="M70 239H206Q234 239 256 258L278 277" dur="9s" repeatCount="indefinite" />
    </circle>
    <circle r="5" class="signal" filter="url(#signalGlow)" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;.07;.1;.29;.38;1" dur="9s" repeatCount="indefinite" />
      <animateMotion path="M70 277H278" dur="9s" repeatCount="indefinite" />
    </circle>
    <circle r="5" class="safety" filter="url(#signalGlow)" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;.13;.16;.32;.41;1" dur="9s" repeatCount="indefinite" />
      <animateMotion path="M70 315H206Q234 315 256 296L278 277" dur="9s" repeatCount="indefinite" />
    </circle>
    <rect x="273" y="246" width="92" height="62" rx="15" fill="none" class="signal-stroke" opacity="0">
      <animate attributeName="opacity" values="0;0;.75;0;0" keyTimes="0;.34;.43;.54;1" dur="9s" repeatCount="indefinite" />
    </rect>
    <rect x="402" y="226" width="0" height="22" rx="5" class="signal" opacity=".55">
      <animate attributeName="width" values="0;0;232;232;0" keyTimes="0;.5;.62;.82;1" dur="9s" repeatCount="indefinite" />
    </rect>
    <rect x="402" y="266" width="0" height="22" rx="5" class="signal" opacity=".34">
      <animate attributeName="width" values="0;0;174;174;0" keyTimes="0;.54;.66;.82;1" dur="9s" repeatCount="indefinite" />
    </rect>
    <rect x="402" y="306" width="0" height="22" rx="5" class="signal" opacity=".24">
      <animate attributeName="width" values="0;0;116;116;0" keyTimes="0;.58;.7;.82;1" dur="9s" repeatCount="indefinite" />
    </rect>
    <circle cx="634" cy="237" r="7" fill="none" class="signal-stroke" opacity="0">
      <animate attributeName="r" values="7;25" dur="9s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;0;.7;0;0" keyTimes="0;.72;.78;.9;1" dur="9s" repeatCount="indefinite" />
    </circle>
  </g>
  <g class="static-fallback"><circle cx="634" cy="237" r="6" class="signal" /></g>

  <text x="40" y="376" class="ink mono" font-size="17" font-weight="700">GCP · RAG · TYPESCRIPT</text>
  <text x="680" y="376" text-anchor="end" class="signal mono" font-size="17" font-weight="700">EXPLORE ↗</text>
  <rect x="1" y="1" width="718" height="398" rx="23" fill="none" class="faint-stroke" />
</svg>
