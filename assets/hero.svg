<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="470" viewBox="0 0 1200 470" role="img" aria-labelledby="title desc">
  <title id="title">Shivam Kumar — DevOps Engineer</title>
  <desc id="desc">Animated profile banner showing a cloud and AI systems operator interface</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050816" />
      <stop offset="0.52" stop-color="#0A1024" />
      <stop offset="1" stop-color="#11103A" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22D3EE" />
      <stop offset="0.55" stop-color="#60A5FA" />
      <stop offset="1" stop-color="#A78BFA" />
    </linearGradient>
    <radialGradient id="glow">
      <stop offset="0" stop-color="#22D3EE" stop-opacity=".24" />
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0" />
    </radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#94A3B8" stroke-opacity=".075" stroke-width="1" />
    </pattern>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <clipPath id="typingClip">
      <rect x="64" y="210" width="0" height="42">
        <animate attributeName="width" values="0;570;570;0;0" keyTimes="0;0.34;0.76;0.9;1" dur="8s" repeatCount="indefinite" />
      </rect>
    </clipPath>
    <style>
      text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; }
      .orbit-a { animation: spin 18s linear infinite; transform-origin: 946px 230px; }
      .orbit-b { animation: spinBack 13s linear infinite; transform-origin: 946px 230px; }
      .float { animation: float 5s ease-in-out infinite; }
      .pulse { animation: pulse 2.4s ease-in-out infinite; }
      .blink { animation: blink 1s steps(2, end) infinite; }
      .flow { animation: dash 4s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes spinBack { to { transform: rotate(-360deg); } }
      @keyframes float { 50% { transform: translateY(-7px); } }
      @keyframes pulse { 50% { opacity: .35; } }
      @keyframes blink { 50% { opacity: 0; } }
      @keyframes dash { to { stroke-dashoffset: -60; } }
      @media (prefers-reduced-motion: reduce) {
        .orbit-a, .orbit-b, .float, .pulse, .blink, .flow { animation: none; }
      }
    </style>
  </defs>

  <rect width="1200" height="470" rx="30" fill="url(#bg)" />
  <rect width="1200" height="470" rx="30" fill="url(#grid)" />
  <circle cx="955" cy="208" r="330" fill="url(#glow)" class="pulse" />
  <path d="M0 405C250 340 370 450 610 390S980 310 1200 355" fill="none" stroke="url(#accent)" stroke-opacity=".14" stroke-width="2" class="flow" stroke-dasharray="8 12" />

  <g transform="translate(54 38)">
    <rect width="1092" height="42" rx="12" fill="#0B1227" stroke="#334155" stroke-opacity=".55" />
    <circle cx="24" cy="21" r="5" fill="#22C55E" filter="url(#softGlow)" class="pulse" />
    <text x="40" y="26" fill="#A7F3D0" font-size="12" font-weight="700" letter-spacing="1.5">SYSTEMS ONLINE</text>
    <text x="850" y="26" fill="#64748B" font-size="11" class="mono">DELHI / INDIA</text>
    <text x="1004" y="26" fill="#94A3B8" font-size="11" class="mono">UTC+5:30</text>
  </g>

  <g transform="translate(64 126)">
    <text x="0" y="0" fill="#22D3EE" font-size="13" font-weight="700" letter-spacing="3">DEVOPS × AI INFRASTRUCTURE</text>
    <text x="0" y="73" fill="#F8FAFC" font-size="66" font-weight="800" letter-spacing="-2.7">SHIVAM KUMAR</text>
  </g>

  <g clip-path="url(#typingClip)">
    <text x="64" y="242" fill="#CBD5E1" font-size="25" font-weight="500">I build dependable systems for the messy real world.</text>
  </g>
  <rect x="638" y="219" width="3" height="29" rx="1.5" fill="#A78BFA" class="blink" />

  <text x="64" y="283" fill="#64748B" font-size="13" class="mono">AUTOMATE EARLY  /  OBSERVE DEEPLY  /  KEEP SYSTEMS CALM</text>

  <g transform="translate(64 323)">
    <g>
      <rect width="174" height="82" rx="16" fill="#0B1227" stroke="#164E63" />
      <text x="18" y="28" fill="#67E8F9" font-size="11" font-weight="700" letter-spacing="1.5">DEPLOYMENT</text>
      <text x="18" y="60" fill="#F8FAFC" font-size="24" font-weight="750">2h → 15m</text>
    </g>
    <g transform="translate(190)">
      <rect width="174" height="82" rx="16" fill="#0B1227" stroke="#3730A3" />
      <text x="18" y="28" fill="#A5B4FC" font-size="11" font-weight="700" letter-spacing="1.5">INCIDENT MTTR</text>
      <text x="18" y="60" fill="#F8FAFC" font-size="24" font-weight="750">60% ↓</text>
    </g>
    <g transform="translate(380)">
      <rect width="174" height="82" rx="16" fill="#0B1227" stroke="#6D28D9" />
      <text x="18" y="28" fill="#C4B5FD" font-size="11" font-weight="700" letter-spacing="1.5">DATA FLOW</text>
      <text x="18" y="60" fill="#F8FAFC" font-size="24" font-weight="750">1M+ / sec</text>
    </g>
  </g>

  <g>
    <circle cx="946" cy="230" r="137" fill="#070C1C" fill-opacity=".64" stroke="#334155" stroke-opacity=".72" />
    <circle cx="946" cy="230" r="104" fill="none" stroke="#22D3EE" stroke-opacity=".28" stroke-width="1.5" stroke-dasharray="4 10" class="orbit-a" />
    <circle cx="946" cy="230" r="73" fill="none" stroke="#A78BFA" stroke-opacity=".44" stroke-width="1.5" stroke-dasharray="2 8" class="orbit-b" />

    <g class="orbit-a">
      <circle cx="946" cy="126" r="7" fill="#22D3EE" filter="url(#softGlow)" />
      <circle cx="1049" cy="244" r="5" fill="#60A5FA" />
      <circle cx="872" cy="303" r="6" fill="#A78BFA" />
    </g>
    <g class="orbit-b">
      <circle cx="946" cy="157" r="4" fill="#C4B5FD" />
      <circle cx="1012" cy="261" r="4" fill="#67E8F9" />
    </g>

    <circle cx="946" cy="230" r="44" fill="#0F172A" stroke="url(#accent)" stroke-width="2" filter="url(#softGlow)" />
    <text x="946" y="240" text-anchor="middle" fill="#F8FAFC" font-size="29" font-weight="800">SK</text>

    <g class="float">
      <rect x="788" y="112" width="108" height="34" rx="10" fill="#0B1227" stroke="#155E75" />
      <text x="842" y="134" text-anchor="middle" fill="#67E8F9" font-size="11" font-weight="700">PLATFORM</text>
    </g>
    <g class="float" style="animation-delay:-1.7s">
      <rect x="1018" y="124" width="92" height="34" rx="10" fill="#0B1227" stroke="#3730A3" />
      <text x="1064" y="146" text-anchor="middle" fill="#A5B4FC" font-size="11" font-weight="700">GITOPS</text>
    </g>
    <g class="float" style="animation-delay:-3.2s">
      <rect x="1029" y="316" width="86" height="34" rx="10" fill="#0B1227" stroke="#6D28D9" />
      <text x="1072" y="338" text-anchor="middle" fill="#C4B5FD" font-size="11" font-weight="700">AI / ML</text>
    </g>
    <g class="float" style="animation-delay:-4.1s">
      <rect x="782" y="307" width="124" height="34" rx="10" fill="#0B1227" stroke="#155E75" />
      <text x="844" y="329" text-anchor="middle" fill="#67E8F9" font-size="11" font-weight="700">RELIABILITY</text>
    </g>
  </g>

  <rect x="1" y="1" width="1198" height="468" rx="29" fill="none" stroke="url(#accent)" stroke-opacity=".32" />
</svg>
