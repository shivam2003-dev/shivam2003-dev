<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">Shivam Kumar — Platform Engineering and Applied AI</title>
  <desc id="desc">An animated control-plane diagram carries a signal through automation, runtime, observability, and AI decision-making before closing the feedback loop.</desc>

  <defs>
    <filter id="signalGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="softGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="22" />
    </filter>
    <pattern id="microGrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" class="grid-line" stroke-width="1" />
    </pattern>
    <clipPath id="frameClip">
      <rect width="1200" height="430" rx="28" />
    </clipPath>
    <path id="controlRoute" d="M750 132H996Q1036 132 1036 172V240Q1036 280 996 280H750Q714 280 714 244V168Q714 132 750 132Z" />

    <style>
      text { font-family: Arial, Helvetica, sans-serif; }
      .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; }
      .bg { fill: #080A0C; }
      .panel { fill: #101316; }
      .panel-2 { fill: #15191D; }
      .ink { fill: #F3F0E8; }
      .muted { fill: #7D8792; }
      .faint-stroke { stroke: #30363C; }
      .grid-line { stroke: #1A2025; }
      .signal { fill: #B8F34A; }
      .signal-stroke { stroke: #B8F34A; }
      .safety { fill: #FF6B35; }
      .safety-stroke { stroke: #FF6B35; }
      .route-flow { animation: routeFlow 2.5s linear infinite; }
      .scan { animation: scan 7s ease-in-out infinite; }
      .ambient-a { animation: ambientA 11s ease-in-out infinite; }
      .ambient-b { animation: ambientB 13s ease-in-out infinite; }
      .heartbeat { animation: heartbeat 2.2s ease-out infinite; transform-origin: 1080px 43px; }
      .static-fallback { display: none; }
      @keyframes routeFlow { to { stroke-dashoffset: -32; } }
      @keyframes scan { 0%, 12% { transform: translateY(-190px); opacity: 0; } 20% { opacity: .42; } 72% { opacity: .16; } 82%, 100% { transform: translateY(210px); opacity: 0; } }
      @keyframes ambientA { 50% { transform: translate(32px, 12px) scale(1.05); opacity: .12; } }
      @keyframes ambientB { 50% { transform: translate(-24px, -10px) scale(.94); opacity: .1; } }
      @keyframes heartbeat { 0% { transform: scale(.7); opacity: .7; } 75%, 100% { transform: scale(2.6); opacity: 0; } }
      @media (prefers-color-scheme: light) {
        .bg { fill: #F3F0E8; }
        .panel { fill: #E8E3D8; }
        .panel-2 { fill: #DED8CA; }
        .ink { fill: #111315; }
        .muted { fill: #5F6870; }
        .faint-stroke { stroke: #C8C0B1; }
        .grid-line { stroke: #DDD7CB; }
        .signal { fill: #456600; }
        .signal-stroke { stroke: #456600; }
        .safety { fill: #C7461D; }
        .safety-stroke { stroke: #C7461D; }
      }
      @media (prefers-reduced-motion: reduce) {
        .motion { display: none; }
        .route-flow, .scan, .ambient-a, .ambient-b, .heartbeat { animation: none; }
        .static-fallback { display: inline; }
      }
    </style>
  </defs>

  <rect width="1200" height="430" rx="28" class="bg" />
  <g clip-path="url(#frameClip)">
    <circle cx="974" cy="60" r="180" fill="#B8F34A" opacity=".075" filter="url(#softGlow)" class="ambient-a" />
    <circle cx="1108" cy="376" r="150" fill="#FF6B35" opacity=".055" filter="url(#softGlow)" class="ambient-b" />
    <rect x="682" y="78" width="464" height="304" rx="24" fill="url(#microGrid)" />
  </g>

  <g transform="translate(54 38)">
    <text x="0" y="10" class="muted mono" font-size="12" font-weight="700" letter-spacing="2.4">FIELD MANUAL 01 / CALM SYSTEMS</text>
    <line x1="0" y1="32" x2="1092" y2="32" class="faint-stroke" stroke-width="1" />
    <text x="905" y="10" class="ink mono" font-size="12" font-weight="700" letter-spacing="1.8">SHIVAM KUMAR</text>
    <circle cx="1026" cy="6" r="4" class="signal" />
    <circle cx="1026" cy="6" r="4" fill="none" class="signal-stroke heartbeat" stroke-width="1" />
    <text x="1040" y="10" class="muted mono" font-size="11" letter-spacing="1.2">DELHI / IN</text>
  </g>

  <g transform="translate(54 112)">
    <text x="0" y="0" class="signal mono" font-size="13" font-weight="700" letter-spacing="2.7">DEVOPS ENGINEER II × AI INFRASTRUCTURE</text>
    <text x="0" y="68" class="ink" font-size="55" font-weight="700" letter-spacing="-2.2">I make complex</text>
    <text x="0" y="126" class="ink" font-size="55" font-weight="700" letter-spacing="-2.2">systems feel <tspan class="signal">calm.</tspan></text>
    <text x="0" y="172" class="muted" font-size="17">Cloud platforms that stay reliable under pressure—</text>
    <text x="0" y="198" class="muted" font-size="17">and AI products that turn complex data into useful decisions.</text>
  </g>

  <g transform="translate(54 353)">
    <rect width="118" height="34" rx="17" class="panel" stroke="#30363C" />
    <text x="59" y="22" text-anchor="middle" class="ink mono" font-size="12" font-weight="700">KUBERNETES</text>
    <rect x="128" width="94" height="34" rx="17" class="panel" stroke="#30363C" />
    <text x="175" y="22" text-anchor="middle" class="ink mono" font-size="12" font-weight="700">GITOPS</text>
    <rect x="232" width="136" height="34" rx="17" class="panel" stroke="#30363C" />
    <text x="300" y="22" text-anchor="middle" class="ink mono" font-size="12" font-weight="700">OBSERVABILITY</text>
    <rect x="378" width="104" height="34" rx="17" class="panel" stroke="#30363C" />
    <text x="430" y="22" text-anchor="middle" class="ink mono" font-size="12" font-weight="700">AI SYSTEMS</text>
  </g>

  <text x="54" y="411" class="muted mono" font-size="11" letter-spacing="1.1">KIMBAL · M.TECH AI &amp; ML, BITS PILANI · MULTI-CLOUD / ON-PREMISES</text>

  <g>
    <rect x="704" y="96" width="420" height="270" rx="20" class="panel" stroke="#30363C" />
    <text x="730" y="123" class="muted mono" font-size="11" font-weight="700" letter-spacing="1.8">LIVE CONTROL-PLANE TRACE</text>
    <circle cx="1093" cy="118" r="4" class="signal" />
    <text x="1076" y="122" text-anchor="end" class="signal mono" font-size="10" font-weight="700">HEALTHY</text>

    <use href="#controlRoute" fill="none" class="faint-stroke" stroke-width="2" />
    <use href="#controlRoute" fill="none" class="signal-stroke route-flow" stroke-width="1.5" stroke-dasharray="5 11" opacity=".42" />

    <g class="motion">
      <circle cx="750" cy="132" r="8" fill="none" class="signal-stroke" opacity="0">
        <animate attributeName="r" values="8;25" dur="9s" begin="0s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0;.7;0;0" keyTimes="0;.04;.13;1" dur="9s" begin="0s" repeatCount="indefinite" />
      </circle>
      <circle cx="866" cy="132" r="8" fill="none" class="signal-stroke" opacity="0">
        <animate attributeName="r" values="8;25" dur="9s" begin="1.4s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0;.7;0;0" keyTimes="0;.04;.13;1" dur="9s" begin="1.4s" repeatCount="indefinite" />
      </circle>
      <circle cx="996" cy="132" r="8" fill="none" class="signal-stroke" opacity="0">
        <animate attributeName="r" values="8;25" dur="9s" begin="2.8s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0;.7;0;0" keyTimes="0;.04;.13;1" dur="9s" begin="2.8s" repeatCount="indefinite" />
      </circle>
      <circle cx="996" cy="280" r="8" fill="none" class="signal-stroke" opacity="0">
        <animate attributeName="r" values="8;25" dur="9s" begin="4.2s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0;.7;0;0" keyTimes="0;.04;.13;1" dur="9s" begin="4.2s" repeatCount="indefinite" />
      </circle>
      <circle cx="866" cy="280" r="8" fill="none" class="safety-stroke" opacity="0">
        <animate attributeName="r" values="8;25" dur="9s" begin="5.6s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0;.75;0;0" keyTimes="0;.04;.13;1" dur="9s" begin="5.6s" repeatCount="indefinite" />
      </circle>
      <circle cx="750" cy="280" r="8" fill="none" class="safety-stroke" opacity="0">
        <animate attributeName="r" values="8;25" dur="9s" begin="7s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0;.75;0;0" keyTimes="0;.04;.13;1" dur="9s" begin="7s" repeatCount="indefinite" />
      </circle>

      <circle r="6" class="safety" filter="url(#signalGlow)" opacity="0">
        <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;.01;.98;1" dur="9s" repeatCount="indefinite" />
        <animateMotion dur="9s" repeatCount="indefinite" rotate="auto">
          <mpath href="#controlRoute" />
        </animateMotion>
      </circle>

      <rect x="710" y="144" width="408" height="3" fill="#B8F34A" opacity=".08" class="scan" />
    </g>

    <g transform="translate(750 116)">
      <circle cx="0" cy="16" r="18" class="panel-2" stroke="#4A535C" />
      <text x="0" y="20" text-anchor="middle" class="ink mono" font-size="10" font-weight="700">IN</text>
      <text x="0" y="50" text-anchor="middle" class="muted mono" font-size="10">SIGNAL</text>
    </g>
    <g transform="translate(866 116)">
      <circle cx="0" cy="16" r="18" class="panel-2" stroke="#4A535C" />
      <text x="0" y="20" text-anchor="middle" class="ink mono" font-size="10" font-weight="700">01</text>
      <text x="0" y="50" text-anchor="middle" class="muted mono" font-size="10">AUTOMATE</text>
    </g>
    <g transform="translate(996 116)">
      <circle cx="0" cy="16" r="18" class="panel-2" stroke="#4A535C" />
      <text x="0" y="20" text-anchor="middle" class="ink mono" font-size="10" font-weight="700">02</text>
      <text x="0" y="50" text-anchor="middle" class="muted mono" font-size="10">RUN</text>
    </g>
    <g transform="translate(996 264)">
      <circle cx="0" cy="16" r="18" class="panel-2" stroke="#4A535C" />
      <text x="0" y="20" text-anchor="middle" class="ink mono" font-size="10" font-weight="700">03</text>
      <text x="0" y="50" text-anchor="middle" class="muted mono" font-size="10">OBSERVE</text>
    </g>
    <g transform="translate(866 264)">
      <circle cx="0" cy="16" r="18" class="panel-2" stroke="#4A535C" />
      <text x="0" y="20" text-anchor="middle" class="ink mono" font-size="10" font-weight="700">04</text>
      <text x="0" y="50" text-anchor="middle" class="muted mono" font-size="10">DECIDE</text>
    </g>
    <g transform="translate(750 264)">
      <circle cx="0" cy="16" r="18" class="panel-2" stroke="#4A535C" />
      <text x="0" y="20" text-anchor="middle" class="ink mono" font-size="10" font-weight="700">↺</text>
      <text x="0" y="50" text-anchor="middle" class="muted mono" font-size="10">FEEDBACK</text>
    </g>

    <g transform="translate(806 190)">
      <rect width="120" height="52" rx="10" class="panel-2" stroke="#30363C" />
      <text x="12" y="17" class="muted mono" font-size="8" letter-spacing="1.2">OPERATED SYSTEM</text>
      <rect x="12" y="27" width="24" height="12" rx="3" fill="none" stroke="#4A535C" />
      <rect x="48" y="27" width="24" height="12" rx="3" fill="none" stroke="#4A535C" />
      <rect x="84" y="27" width="24" height="12" rx="3" fill="none" stroke="#4A535C" />
      <g class="static-fallback" opacity=".72">
        <rect x="12" y="27" width="24" height="12" rx="3" class="signal" />
        <rect x="48" y="27" width="24" height="12" rx="3" class="signal" />
        <rect x="84" y="27" width="24" height="12" rx="3" class="signal" />
      </g>
      <g class="motion">
        <rect x="12" y="27" width="24" height="12" rx="3" class="signal" opacity="0">
          <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;.31;.36;.82;1" dur="9s" repeatCount="indefinite" />
        </rect>
        <rect x="48" y="27" width="24" height="12" rx="3" class="signal" opacity="0">
          <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;.35;.4;.82;1" dur="9s" repeatCount="indefinite" />
        </rect>
        <rect x="84" y="27" width="24" height="12" rx="3" class="signal" opacity="0">
          <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;.39;.44;.82;1" dur="9s" repeatCount="indefinite" />
        </rect>
      </g>
    </g>

    <g transform="translate(730 326)">
      <text x="0" y="0" class="muted mono" font-size="10">TRACE</text>
      <text x="50" y="0" class="ink mono" font-size="10">commit → reconcile → runtime → SLO → decision → feedback</text>
    </g>
  </g>

  <rect x="1" y="1" width="1198" height="428" rx="27" fill="none" stroke="#30363C" />
</svg>
