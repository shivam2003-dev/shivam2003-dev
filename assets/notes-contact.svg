<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">Field notes and contact</title><desc id="desc">The Secure Pipeline newsletter and cvam.sight technical writing about cloud platforms, Kubernetes, inference engineering, coding agents, and research papers, followed by an invitation to compare notes by email or LinkedIn.</desc>
  <defs><pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse"><path d="M24 0H0V24" fill="none" class="grid-line"/></pattern><clipPath id="frame"><rect width="1200" height="430" rx="28"/></clipPath><filter id="glow" x="-200%" y="-200%" width="500%" height="500%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><path id="route" d="M718 286H1078Q1118 286 1118 246V170Q1118 130 1078 130H718"/><style>
    text{font-family:Arial,Helvetica,sans-serif}.mono{font-family:"SFMono-Regular",Consolas,"Liberation Mono",monospace}.bg{fill:#080A0C}.panel{fill:#101316}.panel2{fill:#15191D}.ink{fill:#F3F0E8}.muted{fill:#89939D}.faint{stroke:#30363C}.grid-line{stroke:#1A2025}.signal{fill:#B8F34A}.signal-stroke{stroke:#B8F34A}.safety{fill:#FF6B35}.route-flow{animation:flow 2.7s linear infinite}.pulse{animation:pulse 2.6s ease-out infinite;transform-origin:1128px 39px}@keyframes flow{to{stroke-dashoffset:-34}}@keyframes pulse{0%{transform:scale(.6);opacity:.75}78%,100%{transform:scale(2.7);opacity:0}}
    @media(prefers-color-scheme:light){.bg{fill:#F3F0E8}.panel{fill:#E8E3D8}.panel2{fill:#DED8CA}.ink{fill:#111315}.muted{fill:#5F6870}.faint{stroke:#C8C0B1}.grid-line{stroke:#DDD7CB}.signal{fill:#456600}.signal-stroke{stroke:#456600}.safety{fill:#C7461D}}
    @media(prefers-reduced-motion:reduce){.motion{display:none!important}.route-flow,.pulse{animation:none!important}}
  </style></defs>
  <rect width="1200" height="430" rx="28" class="bg"/><g clip-path="url(#frame)"><rect width="1200" height="430" fill="url(#grid)" opacity=".42"/><circle cx="1040" cy="50" r="180" fill="#B8F34A" opacity=".045"/></g><text x="54" y="43" class="muted mono" font-size="12" font-weight="700" letter-spacing="2.2">FIELD MANUAL 07 / FIELD NOTES + CONTACT</text><circle cx="1128" cy="39" r="4" class="signal"/><circle cx="1128" cy="39" r="4" fill="none" class="signal-stroke pulse"/><text x="1114" y="43" text-anchor="end" class="signal mono" font-size="11" font-weight="700">OPEN CHANNEL</text><line x1="54" y1="65" x2="1146" y2="65" class="faint"/>
  <g transform="translate(54 94)"><text class="signal mono" font-size="11" font-weight="700" letter-spacing="1.8">WRITING / THE SYSTEMS FRONTIER</text><text y="54" class="ink" font-size="38" font-weight="700">The Secure Pipeline</text><text y="88" class="muted" font-size="17">A DevSecOps newsletter about software supply-chain</text><text y="114" class="muted" font-size="17">security and CI/CD automation.</text><text y="166" class="ink" font-size="29" font-weight="700">cvam.sight</text><text y="198" class="muted" font-size="16">Cloud platforms · Kubernetes · inference engineering</text><text y="224" class="muted" font-size="16">coding agents · research papers · first principles</text><g transform="translate(0 258)"><rect width="250" height="42" rx="21" class="panel faint"/><text x="125" y="27" text-anchor="middle" class="signal mono" font-size="12" font-weight="700">READ THE FIELD NOTES ↗</text></g></g>
  <line x1="650" y1="92" x2="650" y2="354" class="faint"/>
  <g transform="translate(700 96)"><text class="safety mono" font-size="11" font-weight="700" letter-spacing="1.8">COLLABORATION SIGNAL</text><text y="58" class="ink" font-size="43" font-weight="700" letter-spacing="-1.5">Let's compare notes.</text><text y="98" class="muted" font-size="17">Building a dependable platform, an applied-AI</text><text y="124" class="muted" font-size="17">product, or a technical learning experience?</text><g transform="translate(0 172)"><rect width="190" height="48" rx="24" class="panel faint"/><circle cx="25" cy="24" r="5" class="signal"/><text x="106" y="30" text-anchor="middle" class="ink mono" font-size="12" font-weight="700">EMAIL ME ↗</text><rect x="206" width="230" height="48" rx="24" class="panel faint"/><circle cx="231" cy="24" r="5" class="safety"/><text x="327" y="30" text-anchor="middle" class="ink mono" font-size="12" font-weight="700">LINKEDIN ↗</text></g><text y="264" class="muted mono" font-size="11" letter-spacing="1.2">DELHI, INDIA · RESPONSE CHANNELS OPEN</text></g>
  <use href="#route" fill="none" class="faint" stroke-width="1.5" opacity=".5"/><use href="#route" fill="none" class="signal-stroke route-flow" stroke-width="1.5" stroke-dasharray="4 12" opacity=".35"/><g class="motion"><circle cx="718" cy="286" r="5" class="signal" filter="url(#glow)"><animateMotion dur="9s" repeatCount="indefinite"><mpath href="#route"/></animateMotion></circle></g>
