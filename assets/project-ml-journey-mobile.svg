<svg xmlns="http://www.w3.org/2000/svg" width="720" height="400" viewBox="0 0 720 400" role="img" aria-labelledby="title desc">
  <title id="title">ML Learning Journey — project-first machine learning</title>
  <desc id="desc">Twenty-six guided projects connect mathematics, model behavior, and implementation.</desc>
  <defs>
    <filter id="signalGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <pattern id="microGrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" class="grid-line" />
    </pattern>
    <clipPath id="frameClip"><rect width="720" height="400" rx="24" /></clipPath>
    <symbol id="projectCell" viewBox="0 0 44 16"><rect width="44" height="16" rx="4" /></symbol>
    <path id="learningRoute" d="M86 226H356V248H86V270H356V292H86V314H140" />
    <style>
      text { font-family: Arial, Helvetica, sans-serif; }
      .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; }
      .bg { fill: #080A0C; } .panel { fill: #101316; } .panel-2 { fill: #15191D; }
      .ink { fill: #F3F0E8; } .muted { fill: #89939D; }
      .faint-stroke { stroke: #30363C; } .node-stroke { stroke: #4A535C; } .grid-line { stroke: #1A2025; }
      .signal { fill: #B8F34A; } .signal-stroke { stroke: #B8F34A; }
      .cell-done { fill: #B8F34A; fill-opacity: .1; stroke: #4A535C; }
      .cell-empty { fill: #15191D; stroke: #30363C; opacity: .4; }
      .route-flow { animation: routeFlow 2.8s linear infinite; } .static-fallback { display: none; }
      @keyframes routeFlow { to { stroke-dashoffset: -30; } }
      @media (prefers-color-scheme: light) {
        .bg { fill: #F3F0E8; } .panel { fill: #E8E3D8; } .panel-2 { fill: #DED8CA; }
        .ink { fill: #111315; } .muted { fill: #5F6870; } .faint-stroke { stroke: #C8C0B1; }
        .node-stroke { stroke: #9E978A; } .grid-line { stroke: #DDD7CB; }
        .signal { fill: #456600; } .signal-stroke { stroke: #456600; }
        .cell-done { fill: #456600; stroke: #9E978A; } .cell-empty { fill: #DED8CA; stroke: #C8C0B1; }
      }
      @media (prefers-reduced-motion: reduce) {
        .motion { display: none !important; } .route-flow { animation: none !important; }
        .static-fallback { display: inline !important; }
      }
    </style>
  </defs>

  <rect width="720" height="400" rx="24" class="bg" />
  <g clip-path="url(#frameClip)"><rect x="28" y="174" width="664" height="178" rx="20" fill="url(#microGrid)" /></g>
  <text x="40" y="43" class="signal mono" font-size="16" font-weight="700" letter-spacing="1.55">03 / PROJECT-FIRST MACHINE LEARNING</text>
  <text x="40" y="94" class="ink" font-size="42" font-weight="700" letter-spacing="-1.3">ML Learning Journey</text>
  <text x="40" y="132" class="muted" font-size="22">Twenty-six guided builds connect mathematics,</text>
  <text x="40" y="160" class="muted" font-size="22">model behavior, and implementation.</text>

  <rect x="40" y="184" width="640" height="154" rx="18" class="panel faint-stroke" />
  <text x="62" y="209" class="muted mono" font-size="13" font-weight="700" letter-spacing="1.3">26 GUIDED BUILDS / LEARNING TRACE</text>
  <circle cx="654" cy="205" r="5" class="signal" />

  <g stroke-width="1">
    <use href="#projectCell" x="64" y="218" width="44" height="16" class="cell-done" /><use href="#projectCell" x="118" y="218" width="44" height="16" class="cell-done" /><use href="#projectCell" x="172" y="218" width="44" height="16" class="cell-done" /><use href="#projectCell" x="226" y="218" width="44" height="16" class="cell-done" /><use href="#projectCell" x="280" y="218" width="44" height="16" class="cell-done" /><use href="#projectCell" x="334" y="218" width="44" height="16" class="cell-done" />
    <use href="#projectCell" x="64" y="240" width="44" height="16" class="cell-done" /><use href="#projectCell" x="118" y="240" width="44" height="16" class="cell-done" /><use href="#projectCell" x="172" y="240" width="44" height="16" class="cell-done" /><use href="#projectCell" x="226" y="240" width="44" height="16" class="cell-done" /><use href="#projectCell" x="280" y="240" width="44" height="16" class="cell-done" /><use href="#projectCell" x="334" y="240" width="44" height="16" class="cell-done" />
    <use href="#projectCell" x="64" y="262" width="44" height="16" class="cell-done" /><use href="#projectCell" x="118" y="262" width="44" height="16" class="cell-done" /><use href="#projectCell" x="172" y="262" width="44" height="16" class="cell-done" /><use href="#projectCell" x="226" y="262" width="44" height="16" class="cell-done" /><use href="#projectCell" x="280" y="262" width="44" height="16" class="cell-done" /><use href="#projectCell" x="334" y="262" width="44" height="16" class="cell-done" />
    <use href="#projectCell" x="64" y="284" width="44" height="16" class="cell-done" /><use href="#projectCell" x="118" y="284" width="44" height="16" class="cell-done" /><use href="#projectCell" x="172" y="284" width="44" height="16" class="cell-done" /><use href="#projectCell" x="226" y="284" width="44" height="16" class="cell-done" /><use href="#projectCell" x="280" y="284" width="44" height="16" class="cell-done" /><use href="#projectCell" x="334" y="284" width="44" height="16" class="cell-done" />
    <use href="#projectCell" x="64" y="306" width="44" height="16" class="cell-done" /><use href="#projectCell" x="118" y="306" width="44" height="16" class="cell-done" /><use href="#projectCell" x="172" y="306" width="44" height="16" class="cell-empty" /><use href="#projectCell" x="226" y="306" width="44" height="16" class="cell-empty" /><use href="#projectCell" x="280" y="306" width="44" height="16" class="cell-empty" /><use href="#projectCell" x="334" y="306" width="44" height="16" class="cell-empty" />
  </g>
  <use href="#learningRoute" fill="none" class="signal-stroke route-flow" stroke-dasharray="3 12" opacity=".2" />

  <line x1="444" y1="226" x2="444" y2="314" class="faint-stroke" stroke-width="2" />
  <g>
    <circle cx="444" cy="226" r="8" class="panel-2 signal-stroke" />
    <circle cx="444" cy="270" r="8" class="panel-2 signal-stroke" />
    <circle cx="444" cy="314" r="8" class="panel-2 signal-stroke" />
    <text x="466" y="231" class="ink mono" font-size="13" font-weight="700">MATH</text>
    <text x="466" y="275" class="ink mono" font-size="13" font-weight="700">MODEL</text>
    <text x="466" y="319" class="ink mono" font-size="13" font-weight="700">BUILD</text>
    <text x="566" y="257" class="signal mono" font-size="24" font-weight="700">26</text>
    <text x="566" y="278" class="muted mono" font-size="11">PROJECTS</text>
  </g>

  <g class="motion">
    <circle r="6" class="signal" filter="url(#signalGlow)" opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;.03;.97;1" dur="9s" repeatCount="indefinite" />
      <animateMotion dur="9s" repeatCount="indefinite"><mpath href="#learningRoute" /></animateMotion>
    </circle>
    <circle cx="444" cy="226" r="9" fill="none" class="signal-stroke" opacity="0">
      <animate attributeName="r" values="9;27" dur="9s" repeatCount="indefinite" />
      <animate attributeName="opacity" values=".7;0;0" keyTimes="0;.18;1" dur="9s" repeatCount="indefinite" />
    </circle>
    <circle cx="444" cy="270" r="9" fill="none" class="signal-stroke" opacity="0">
      <animate attributeName="r" values="9;27" dur="9s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;0;.7;0;0" keyTimes="0;.34;.4;.56;1" dur="9s" repeatCount="indefinite" />
    </circle>
    <circle cx="444" cy="314" r="9" fill="none" class="signal-stroke" opacity="0">
      <animate attributeName="r" values="9;27" dur="9s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;0;.7;0;0" keyTimes="0;.72;.78;.94;1" dur="9s" repeatCount="indefinite" />
    </circle>
  </g>
  <g class="static-fallback">
    <rect x="114" y="303" width="52" height="22" rx="6" fill="none" class="signal-stroke" opacity=".65" />
    <circle cx="444" cy="314" r="14" fill="none" class="signal-stroke" opacity=".55" />
  </g>

  <text x="40" y="376" class="ink mono" font-size="17" font-weight="700">26 PROJECTS · MATH · MODELS · CODE</text>
  <text x="680" y="376" text-anchor="end" class="signal mono" font-size="17" font-weight="700">BUILD ↗</text>
  <rect x="1" y="1" width="718" height="398" rx="23" fill="none" class="faint-stroke" />
</svg>
